<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="7200">
<title>LAKE VIEW — DESSERT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a86a;
    --line:rgba(201,168,106,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#0d1512}

  /* ── 골드 프레임 ── */
  .frame{
    position:fixed; inset:1.4vw;
    border:1px solid var(--line);
    pointer-events:none; z-index:20;
  }
  .frame::before,.frame::after{
    content:""; position:absolute; width:2.4vw; height:2.4vw;
    border:1px solid var(--gold);
  }
  .frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

  /* ── 슬라이드 ── */
  .slide{
    position:absolute; inset:0;
    opacity:0;
    transition:opacity 1.4s ease;
    pointer-events:none;
    overflow:hidden;
    background:#0d1512;
  }
  .slide.on{opacity:1; z-index:2}

  /* 배경: 같은 사진을 블러+확대로 깔아 빈 공간 채움 */
  .slide .bg{
    position:absolute; inset:-6%;
    width:112%; height:112%;
    object-fit:cover;
    filter:blur(28px) brightness(.45) saturate(1.1);
  }
  /* 전경: 원본 비율 그대로, 천천히 확대 */
  .slide .fg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
  }
  .slide.on .fg{
    animation:kb 9s ease-out forwards;
  }
  @keyframes kb{
    from{transform:scale(1)}
    to{transform:scale(1.05)}
  }

  /* 워터마크 */
  .wm{
    position:absolute; right:4vw; bottom:3.2vw; text-align:right;
    font-family:'Cormorant Garamond',serif;
    font-size:1.3vw; letter-spacing:.4vw; color:rgba(255,255,255,.85);
    text-shadow:0 .15vw .8vw rgba(0,0,0,.7);
    z-index:3;
  }
  .wm small{
    display:block; font-size:.68vw; letter-spacing:.35vw;
    color:rgba(201,168,106,.95); margin-top:.2vw;
  }

  /* 인트로 */
  .intro .shade{
    position:absolute; inset:0; z-index:2;
    background:
      linear-gradient(to top, rgba(10,15,13,.8), transparent 50%),
      radial-gradient(ellipse at center, transparent 25%, rgba(10,15,13,.55) 100%);
  }
  .intro .center{
    position:absolute; inset:0; z-index:3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#fff;
  }
  .intro .eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-size:1.2vw; letter-spacing:.55vw; color:var(--gold);
    text-transform:uppercase;
  }
  .intro .big{
    font-family:'Cormorant Garamond',serif;
    font-size:6.5vw; font-weight:600; letter-spacing:1.4vw; text-indent:1.4vw;
    text-shadow:0 .3vw 2vw rgba(0,0,0,.75);
    margin:.5vw 0;
  }
  .intro .sub{
    font-family:'Cormorant Garamond',serif;
    font-size:1.15vw; letter-spacing:.7vw; color:rgba(255,255,255,.9);
  }
</style>
</head>
<body>

<div class="frame"></div>

<!-- 인트로 -->
<div class="slide intro on" data-dur="7">
  <img class="bg" src="d15.jpg" alt="">
  <img class="fg" src="d15.jpg" alt="" style="filter:brightness(.75)">
  <div class="shade"></div>
  <div class="center">
    <div class="eyebrow">Lake View</div>
    <div class="big">DESSERT</div>
    <div class="sub">&amp; BAKERY</div>
  </div>
</div>

<script>
  // ── 디저트 사진 목록 (인트로에 쓴 d15 제외, 순서 바꾸려면 여기서 조정) ──
  var photos = ["d1","d2","d3","d4","d5","d6","d7","d8","d9","d10",
                "d11","d12","d13","d14","d16","d17","d18","d19","d20",
                "d21","d22","d23","d24"];
  var PHOTO_SEC = 6;   // 사진당 머무는 시간(초)

  // 슬라이드 자동 생성
  for (var i=0; i<photos.length; i++){
    var d = document.createElement('div');
    d.className = 'slide';
    d.setAttribute('data-dur', PHOTO_SEC);
    d.innerHTML =
      '<img class="bg" src="'+photos[i]+'.jpg" alt="">' +
      '<img class="fg" src="'+photos[i]+'.jpg" alt="">' +
      '<div class="wm">LAKE VIEW<small>DESSERT &amp; BRUNCH</small></div>';
    document.body.appendChild(d);
  }

  var slides = document.querySelectorAll('.slide');
  var current = 0;

  function show(i){
    for(var k=0;k<slides.length;k++){
      slides[k].className = slides[k].className.replace(' on','');
    }
    slides[i].className += ' on';
    var dur = parseInt(slides[i].getAttribute('data-dur')) || 8;
    setTimeout(nextSlide, dur * 1000);
  }
  function nextSlide(){
    current = (current + 1) % slides.length;
    show(current);
  }
  (function(){
    var dur = parseInt(slides[0].getAttribute('data-dur')) || 8;
    setTimeout(nextSlide, dur * 1000);
  })();
</script>

</body>
</html>
